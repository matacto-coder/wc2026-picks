<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Pick'em</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0e1a;--surface:#111827;--surface2:#1a2236;--border:#1e2d45;--accent:#e8b84b;--accent2:#3b82f6;--green:#22c55e;--red:#ef4444;--text:#f1f5f9;--muted:#64748b;--p1:#e8b84b;--p2:#3b82f6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .header{background:#111827;border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);letter-spacing:2px;}
  .logo span{color:#fff;}
  .player-tabs{display:flex;gap:6px;}
  .player-tab{padding:7px 16px;border-radius:6px;border:2px solid transparent;cursor:pointer;font-weight:600;font-size:13px;transition:all .15s;background:var(--surface2);}
  .player-tab.p1{color:var(--p1);border-color:var(--p1);}
  .player-tab.p2{color:var(--p2);border-color:var(--p2);}
  .player-tab.p1.active{background:var(--p1);color:#000;}
  .player-tab.p2.active{background:var(--p2);color:#fff;}
  .sync-badge{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:600;}
  .sync-badge.ok{background:#052e16;color:var(--green);border:1px solid var(--green);}
  .sync-badge.err{background:#450a0a;color:var(--red);border:1px solid var(--red);}
  .sync-badge.off{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .nav{display:flex;border-bottom:2px solid var(--border);padding:0 20px;overflow-x:auto;}
  .nav-btn{padding:11px 18px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;text-transform:uppercase;letter-spacing:.5px;}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
  .nav-btn:hover:not(.active){color:var(--text);}
  .content{padding:20px;max-width:880px;margin:0 auto;}
  .scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .score-card{background:var(--surface);border-radius:12px;padding:20px;text-align:center;border:2px solid var(--border);}
  .score-card.p1{border-color:var(--p1);}
  .score-card.p2{border-color:var(--p2);}
  .score-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
  .score-num{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;}
  .score-card.p1 .score-num{color:var(--p1);}
  .score-card.p2 .score-num{color:var(--p2);}
  .score-sub{font-size:12px;color:var(--muted);margin-top:4px;}
  .group-title{font-family:'Bebas Neue',sans-serif;font-size:21px;color:var(--accent);letter-spacing:2px;margin-bottom:10px;margin-top:24px;display:flex;align-items:center;gap:10px;}
  .group-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .match-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid transparent;border-radius:9px;padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .match-card.picked-p1{border-left-color:var(--p1);}
  .match-card.picked-p2{border-left-color:var(--p2);}
  .match-card.correct{border-left-color:var(--green)!important;}
  .match-card.wrong{border-left-color:var(--red)!important;}
  .match-left{display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px;}
  .match-teams{display:flex;align-items:center;gap:8px;}
  .team{font-weight:600;font-size:13px;flex:1;}
  .team.right{text-align:right;}
  .vs{font-size:10px;color:var(--muted);font-weight:700;}
  .match-date{font-size:11px;color:var(--muted);}
  .picks{display:flex;gap:5px;flex-wrap:wrap;}
  .pbtn{padding:4px 10px;border-radius:5px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap;}
  .pbtn:hover{border-color:#3a4a65;color:var(--text);}
  .pbtn.sel-h{background:var(--p1);border-color:var(--p1);color:#000;}
  .pbtn.sel-d{background:#6366f1;border-color:#6366f1;color:#fff;}
  .pbtn.sel-a{background:var(--p2);border-color:var(--p2);color:#fff;}
  .pbtn.sel-h2{background:#22c55e;border-color:#22c55e;color:#000;}
  .pbtn.sel-d2{background:#8b5cf6;border-color:#8b5cf6;color:#fff;}
  .pbtn.sel-a2{background:#f59e0b;border-color:#f59e0b;color:#000;}
  .res{display:flex;align-items:center;gap:5px;}
  .rinput{width:34px;padding:4px;text-align:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:5px;color:var(--text);font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;}
  .rinput:focus{outline:none;border-color:var(--accent2);}
  .icon-ok{color:var(--green);font-weight:700;}
  .icon-x{color:var(--red);font-weight:700;}
  .admin-bar{background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:9px 14px;margin-bottom:18px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);flex-wrap:wrap;}
  .atoggle{background:none;border:1px solid var(--muted);border-radius:4px;color:var(--muted);padding:3px 10px;cursor:pointer;font-size:12px;}
  .atoggle.on{border-color:var(--green);color:var(--green);}
  .note{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:18px;line-height:1.6;}
  .setup-box{background:var(--surface);border:2px solid var(--accent);border-radius:12px;padding:20px;margin-bottom:20px;}
  .setup-box h3{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);letter-spacing:1px;margin-bottom:12px;}
  .config-input{width:100%;padding:9px 12px;background:var(--surface2);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;margin-bottom:8px;}
  .config-input:focus{outline:none;border-color:var(--accent);}
  .save-btn{background:var(--accent);color:#000;border:none;border-radius:6px;padding:9px 20px;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .save-btn:hover{opacity:.9;}
  .name-edit{background:none;border:none;border-bottom:1px solid transparent;color:inherit;font-family:'DM Sans',sans-serif;font-weight:600;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:2px 4px;}
  .name-edit:hover,.name-edit:focus{border-bottom-color:currentColor;outline:none;}
</style>

// ── FIREBASE ─────────────────────────────────────────────────────
let db = null;
let unsubPicks = null, unsubResults = null, unsubNames = null;

async function initFirebase() {
  if (!FB_CONFIG) return;
  try {
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
    const { getDatabase, ref, set, onValue, off } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    const app = initializeApp(FB_CONFIG);
    db = { getDatabase, ref, set, onValue, off, rtdb: getDatabase(app) };
    S.fbReady = true;
    subscribeAll();
  } catch(e) {
    S.fbError = 'Firebase error: ' + e.message;
    render();
  }
}

function subscribeAll() {
  if (!db) return;
  const { ref, onValue, rtdb } = db;
  onValue(ref(rtdb,'picks'), snap => {
    const d = snap.val();
    if (d) { S.picks = d; render(); }
  });
  onValue(ref(rtdb,'results'), snap => {
    const d = snap.val();
    if (d) { S.results = d; render(); }
  });
  onValue(ref(rtdb,'koTeams'), snap => {
    const d = snap.val();
    if (d) { S.koTeams = d; render(); }
  });
  onValue(ref(rtdb,'names'), snap => {
    const d = snap.val();
    if (d) { S.names = d; render(); }
  });
}

async function fbSet(path, data) {
  if (!db) return;
  const { ref, set, rtdb } = db;
  await set(ref(rtdb, path), data);
}

// ── LOCAL FALLBACK ───────────────────────────────────────────────

  try { localStorage.setItem('wc2026c', JSON.stringify({names:S.names,picks:S.picks,results:S.results,koTeams:S.koTeams})); } catch(e){}
  if (db) {
    fbSet('picks', S.picks);
    fbSet('results', S.results);
    fbSet('names', S.names);
    fbSet('koTeams', S.koTeams);
  }
}
function load() {
  try { const d=localStorage.getItem('wc2026c'); if(d){const p=JSON.parse(d);S.names=p.names||S.names;S.picks=p.picks||S.picks;S.results=p.results||S.results;S.koTeams=p.koTeams||S.koTeams;} } catch(e){}
}

// ── ACTIONS ──────────────────────────────────────────────────────
function setPick(id,val) {
  if (S.picks[S.player]?.[id]===val) delete S.picks[S.player][id];
  else { if(!S.picks[S.player])S.picks[S.player]={}; S.picks[S.player][id]=val; }
  save(); render();
}
function setRes(id,side,val) {
  if(!S.results[id])S.results[id]={};
  S.results[id][side]=val;
  const h=parseInt(S.results[id].home??''), a=parseInt(S.results[id].away??'');
  if(!isNaN(h)&&!isNaN(a)) S.results[id].winner=h>a?'home':a>h?'away':'draw';
  else if(S.results[id]) delete S.results[id].winner;
  save(); render();
}
function score(pl) {
  let cor=0,tot=0;
  for(const[id,pick] of Object.entries(S.picks[pl]||{})){const r=S.results[id];if(r?.winner){tot++;if(pick===r.winner)cor++;}}
  return {cor,tot,picks:Object.keys(S.picks[pl]||{}).length};
}

// ── TIME CONVERSION ──────────────────────────────────────────────
function toBST(dateStr) {
  if (!dateStr) return '';
  try {
    const m = dateStr.match(/(\d+):(\d+)\s*(AM|PM)/i);
    if (!m) return '';
    let hours = parseInt(m[1]);
    const mins = m[2];
    const ampm = m[3].toUpperCase();
    if (ampm === 'PM' && hours !== 12) hours += 12;
    if (ampm === 'AM' && hours === 12) hours = 0;
    // ET to BST = +5 hours
    hours += 5;
    let day = '';
    if (hours >= 24) { hours -= 24; day = ' (+1)'; }
    const bstAmpm = hours >= 12 ? 'PM' : 'AM';
    const bstHours = hours > 12 ? hours - 12 : hours === 0 ? 12 : hours;
    return `${bstHours}:${mins} ${bstAmpm}${day}`;
  } catch(e) { return ''; }
}

// ── KICKOFF LOCK ─────────────────────────────────────────────────
// Parse "Jun 12, 9:00 PM ET" -> Date object in ET
function kickoffTime(dateStr) {
  if (!dateStr) return null;
  try {
    const m = dateStr.match(/(\w+ \d+),\s*(\d+:\d+\s*[AP]M)/i);
    if (!m) return null;
    const parsed = new Date(`${m[1]} 2026 ${m[2]} EDT`);
    return isNaN(parsed) ? null : parsed;
  } catch(e) { return null; }
}
function isLocked(m) {
  const t = kickoffTime(m.date);
  if (!t) return false;
  return Date.now() >= t.getTime();
}

// ── RENDER HELPERS ───────────────────────────────────────────────
const KO_GROUPS = new Set(['R32','R16','QF','SF','THIRD','FINAL']);

function setKOTeam(id, side, val) {
  if (!S.koTeams[id]) S.koTeams[id] = {};
  S.koTeams[id][side] = val;
  save(); // syncs to Firebase
}
window._setKOTeam = (id, side, val) => { setKOTeam(id, side, val); };

function matchCard(m, showGroup=false) {
  const pl=S.player, res=S.results[m.id];
  const locked = isLocked(m);
  const isKO = KO_GROUPS.has(m.g);

  // Use custom team names for KO rounds if set
  const homeName = (isKO && S.koTeams[m.id]?.home) ? S.koTeams[m.id].home : m.home;
  const awayName = (isKO && S.koTeams[m.id]?.away) ? S.koTeams[m.id].away : m.away;

  const pick = S.picks[pl]?.[m.id];
  let cls='match-card';
  if(pick) cls+=pl==='p1'?' picked-p1':' picked-p2';
  if(pick&&res?.winner) cls+=pick===res.winner?' correct':' wrong';
  const bc=(w)=>{if(pick!==w)return'pbtn';if(pl==='p1')return w==='home'?'pbtn sel-h':w==='draw'?'pbtn sel-d':'pbtn sel-a';return w==='home'?'pbtn sel-h2':w==='draw'?'pbtn sel-d2':'pbtn sel-a2';};
  const icon=(pick&&res?.winner)?(pick===res.winner?'<span class="icon-ok">✓</span>':'<span class="icon-x">✗</span>'):'';
  const hs=homeName.split(' ')[0], as=awayName.split(' ')[0];

  // Admin score inputs
  const resHtml=S.admin
    ?`<div class="res"><input class="rinput" type="number" min="0" max="20" placeholder="-" value="${res?.home??''}" oninput="setPick_res('${m.id}','home',this.value)"><span style="color:var(--muted);font-weight:700">:</span><input class="rinput" type="number" min="0" max="20" placeholder="-" value="${res?.away??''}" oninput="setPick_res('${m.id}','away',this.value)"></div>`
    :(res?.winner?`<small style="color:var(--muted);font-size:11px">${res.home}–${res.away}</small>`:'');

  // KO team name editors (admin only)
  const koNameEditors = (isKO && S.admin)
    ? `<div style="display:flex;gap:6px;margin-top:6px;align-items:center;">
        <input style="flex:1;background:var(--surface2);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:3px 7px;font-size:11px;font-family:'DM Sans',sans-serif;" placeholder="${m.home}" value="${homeName!==m.home?homeName:''}" onchange="window._setKOTeam('${m.id}','home',this.value||'${m.home}')" onblur="window._setKOTeam('${m.id}','home',this.value||'${m.home}')">
        <span style="color:var(--muted);font-size:10px;">VS</span>
        <input style="flex:1;background:var(--surface2);border:1px solid var(--accent);border-radius:4px;color:var(--text);padding:3px 7px;font-size:11px;font-family:'DM Sans',sans-serif;" placeholder="${m.away}" value="${awayName!==m.away?awayName:''}" onchange="window._setKOTeam('${m.id}','away',this.value||'${m.away}')" onblur="window._setKOTeam('${m.id}','away',this.value||'${m.away}')">
       </div>`
    : '';

  const pickSection = locked
    ? `<div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:16px">🔒</span>
        ${pick ? `<span style="font-size:12px;font-weight:700;color:var(--muted)">Picked: <span style="color:var(--text)">${pick.toUpperCase()}</span></span>` : `<span style="font-size:12px;color:var(--muted)">No pick</span>`}
       </div>`
    : isKO
      ? `<div class="picks">
          <button class="${bc('home')}" onclick="window._pick('${m.id}','home')">${hs}</button>
          <button class="${bc('away')}" onclick="window._pick('${m.id}','away')">${as}</button>
         </div>`
      : `<div class="picks">
          <button class="${bc('home')}" onclick="window._pick('${m.id}','home')">${hs}</button>
          <button class="${bc('draw')}" onclick="window._pick('${m.id}','draw')">Draw</button>
          <button class="${bc('away')}" onclick="window._pick('${m.id}','away')">${as}</button>
         </div>`;

  return `<div class="${cls}">
    <div class="match-left">
      <div class="match-teams"><span class="team">${homeName}</span><span class="vs">VS</span><span class="team right">${awayName}</span></div>
      <div class="match-date">${showGroup ? `<span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:10px;font-weight:700;margin-right:6px;color:var(--text)">GRP ${m.g}</span>` : `<span style="color:var(--accent);font-weight:700;margin-right:6px">M${m.num}</span>`}📅 ${m.date} <span style="color:var(--muted);font-size:10px">(${toBST(m.date)} BST)</span>${locked?' 🔒':''}</div>
      ${koNameEditors}
    </div>
    ${pickSection}
    ${resHtml}${icon}
  </div>`;
}

window._pick = (id,v) => { const m=MATCHES.find(x=>x.id===id); if(m&&isLocked(m)) return; setPick(id,v); };
window.setPick_res = (id,s,v) => setRes(id,s,v);

function syncBadge() {
  if (!FB_CONFIG) return `<span class="sync-badge off">💾 Local only</span>`;
  if (S.fbError) return `<span class="sync-badge err">⚠ ${S.fbError}</span>`;
  if (S.fbReady) return `<span class="sync-badge ok">🔴 Live Sync ON</span>`;
  return `<span class="sync-badge off">⏳ Connecting...</span>`;
}

function renderSetup() {
  const cur = FB_CONFIG ? JSON.stringify(FB_CONFIG,null,2) : '';
  return `<div class="setup-box">
    <h3>⚙ Firebase Setup</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:12px">Paste your Firebase config JSON below to enable real-time sync between players.</p>
    <textarea class="config-input" id="fbConfigInput" rows="8" placeholder='{\n  "apiKey": "...",\n  "authDomain": "...",\n  "databaseURL": "...",\n  "projectId": "..."\n}'>${cur}</textarea>
    <button class="save-btn" onclick="window._saveConfig()">Save & Connect</button>
    ${FB_CONFIG ? '<button style="margin-left:8px;background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:9px 16px;cursor:pointer;font-size:13px;" onclick="window._clearConfig()">Clear Config</button>' : ''}
  </div>`;
}

window._saveConfig = () => {
  try {
    let v = document.getElementById('fbConfigInput').value.trim();
    // Strip: const firebaseConfig = { ... }; or just the object
    v = v.replace(/const\s+\w+\s*=\s*/, '').replace(/;\s*$/, '').trim();
    // Add quotes around unquoted keys: apiKey: -> "apiKey":
    v = v.replace(/([{,]\s*)(\w+)\s*:/g, '$1"$2":');
    // Try parsing
    FB_CONFIG = JSON.parse(v);
    // Add databaseURL if missing - derive from projectId
    if (!FB_CONFIG.databaseURL && FB_CONFIG.projectId) {
      FB_CONFIG.databaseURL = `https://${FB_CONFIG.projectId}-default-rtdb.firebaseio.com`;
    }
    localStorage.setItem('wc2026_fbconfig', JSON.stringify(FB_CONFIG));
    initFirebase().then(render);
  } catch(e) {
    alert('Could not read config. Try pasting just the part inside the { } curly braces, or the whole const firebaseConfig = { ... } line.');
  }
};
window._clearConfig = () => {
  localStorage.removeItem('wc2026_fbconfig');
  FB_CONFIG = null; db = null; S.fbReady = false;
  render();
};

function renderScore() {
  const s1=score('p1'), s2=score('p2');
  return `
  <div class="scoreboard">
    <div class="score-card p1">
      <div class="score-name" style="color:var(--p1)"><input class="name-edit" style="color:var(--p1)" value="${S.names.p1}" oninput="S.names.p1=this.value;save();renderHeader()"></div>
      <div class="score-num">${s1.cor}</div>
      <div class="score-sub">${s1.cor}/${s1.tot} graded &bull; ${s1.picks} picks made</div>
    </div>
    <div class="score-card p2">
      <div class="score-name" style="color:var(--p2)"><input class="name-edit" style="color:var(--p2)" value="${S.names.p2}" oninput="S.names.p2=this.value;save();renderHeader()"></div>
      <div class="score-num">${s2.cor}</div>
      <div class="score-sub">${s2.cor}/${s2.tot} graded &bull; ${s2.picks} picks made</div>
    </div>
  </div>
  ${!FB_CONFIG ? renderSetup() : ''}
  <div class="note">📌 <strong>How it works:</strong> Switch between players (top right) to make picks. Each player picks Home / Draw / Away for every match. Turn on Admin Mode to enter actual scores — correct picks turn green ✓, wrong ones red ✗. Rename players by clicking their names above.</div>
  ${renderRecentPicks()}`;
}

function renderRecentPicks() {
  const entries = Object.entries(S.picks[S.player]||{});
  if(!entries.length) return `<div style="color:var(--muted);font-size:14px;margin-top:12px">No picks yet — head to Group Stage to start!</div>`;
  return `<div class="group-title">Last Picks — ${S.names[S.player]}</div>` +
    entries.slice(-8).reverse().map(([id,pick])=>{
      const m=MATCHES.find(x=>x.id===id); if(!m) return '';
      const r=S.results[id]; const ok=r?.winner?(pick===r.winner?'✓':'✗'):'';
      const c=ok==='✓'?'var(--green)':ok==='✗'?'var(--red)':'var(--muted)';
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:13px">
        <span>${m.home} <span style="color:var(--muted)">vs</span> ${m.away} <span style="color:var(--muted);font-size:11px">(${m.date})</span></span>
        <span style="color:${c};font-weight:700">${pick.toUpperCase()} ${ok}</span></div>`;
    }).join('');
}

function renderGroups() {
  return GROUPS_ORDER.map(g => {
    const ms = MATCHES.filter(m=>m.g===g);
    return `<div class="group-title">Group ${g}</div>${ms.map(matchCard).join('')}`;
  }).join('');
}

function renderByDate() {
  const KO = new Set(['R32','R16','QF','SF','THIRD','FINAL']);
  const groupMatches = MATCHES.filter(m => !KO.has(m.g));
  const sorted = [...groupMatches].sort((a,b) => a.num - b.num);
  const byDate = {};
  for (const m of sorted) {
    const dateKey = m.date.split(',')[0];
    if (!byDate[dateKey]) byDate[dateKey] = [];
    byDate[dateKey].push(m);
  }
  const monthOrder = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const sortedDates = Object.keys(byDate).sort((a,b) => {
    const [am, ad] = a.split(' ');
    const [bm, bd] = b.split(' ');
    return (monthOrder[am]*100 + parseInt(ad)) - (monthOrder[bm]*100 + parseInt(bd));
  });
  return sortedDates.map(date => {
    const ms = byDate[date];
    return `<div class="group-title">${date}</div>${ms.map(m => matchCard(m, true)).join('')}`;
  }).join('');
}

function renderKnockout() {
  return `<div class="note">🏆 Knockout rounds — no draws, pick a winner for each slot. Team names fill in as the tournament progresses.</div>` +
    KO_STAGES.map(({key,label}) => {
      const ms = MATCHES.filter(m=>m.g===key);
      return `<div class="group-title">${label}</div>${ms.map(matchCard).join('')}`;
    }).join('');
}

function renderHeader() {
  const hdr = document.getElementById('hdr'); if(!hdr) return;
  hdr.innerHTML = `
    <div class="logo">World Cup <span>2026</span> ⚽</div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      ${syncBadge()}
      <div class="player-tabs">
        <button class="player-tab p1 ${S.player==='p1'?'active':''}" onclick="S.player='p1';render()">${S.names.p1}</button>
        <button class="player-tab p2 ${S.player==='p2'?'active':''}" onclick="S.player='p2';render()">${S.names.p2}</button>
      </div>
    </div>`;
}

function renderVersus() {
  const KO = new Set(['R32','R16','QF','SF','THIRD','FINAL']);
  const groupMatches = MATCHES.filter(m => !KO.has(m.g));
  const p1name = S.names.p1, p2name = S.names.p2;

  // Sort by date
  const sorted = [...groupMatches].sort((a,b) => a.num - b.num);

  // Group by date for headers
  const byDate = {};
  for (const m of sorted) {
    const dateKey = m.date.split(',')[0];
    if (!byDate[dateKey]) byDate[dateKey] = [];
    byDate[dateKey].push(m);
  }
  const monthOrder = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const sortedDates = Object.keys(byDate).sort((a,b) => {
    const [am,ad]=a.split(' '); const [bm,bd]=b.split(' ');
    return (monthOrder[am]*100+parseInt(ad))-(monthOrder[bm]*100+parseInt(bd));
  });

  const rows = sorted.map(m => {
    const p1pick = S.picks.p1?.[m.id];
    const p2pick = S.picks.p2?.[m.id];
    const res = S.results[m.id];
    const agree = p1pick && p2pick && p1pick === p2pick;
    const bothPicked = p1pick && p2pick;

    const rowBg = !bothPicked ? '' : agree
      ? 'border-left:3px solid var(--green);'
      : 'border-left:3px solid var(--red);';

    const pickLabel = (pick, player) => {
      if (!pick) return `<span style="color:var(--muted);font-size:12px">No pick</span>`;
      let color = player === 'p1' ? 'var(--p1)' : 'var(--p2)';
      let icon = '';
      if (res?.winner) icon = pick === res.winner ? ' ✓' : ' ✗';
      const iconColor = icon === ' ✓' ? 'var(--green)' : 'var(--red)';
      return `<span style="font-weight:700;color:${color}">${pick.toUpperCase()}</span>${icon ? `<span style="color:${iconColor};font-weight:700">${icon}</span>` : ''}`;
    };

    const agreeIcon = bothPicked ? (agree
      ? `<span style="color:var(--green);font-size:16px;font-weight:700">✓</span>`
      : `<span style="color:var(--red);font-size:16px;font-weight:700">✗</span>`)
      : `<span style="color:var(--muted);font-size:14px">—</span>`;

    return `<div style="background:var(--surface);border:1px solid var(--border);${rowBg}border-radius:9px;padding:10px 14px;margin-bottom:7px;display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:12px;">
      <div>
        <div style="font-weight:600;font-size:13px">${m.home} <span style="color:var(--muted)">vs</span> ${m.away}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px"><span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-weight:700;margin-right:5px">GRP ${m.g}</span>${m.date}${res?.winner ? ` <span style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 8px;margin-left:6px;font-weight:700;color:var(--text)">${res.home} – ${res.away}</span>` : ''}</div>
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${p1name}</div>
        ${pickLabel(p1pick, 'p1')}
      </div>
      <div style="text-align:center;min-width:70px">
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">${p2name}</div>
        ${pickLabel(p2pick, 'p2')}
      </div>
      <div style="text-align:center;min-width:24px">${agreeIcon}</div>
    </div>`;
  });

  // Summary counts
  const bothPicked = groupMatches.filter(m => S.picks.p1?.[m.id] && S.picks.p2?.[m.id]);
  const agreed = bothPicked.filter(m => S.picks.p1[m.id] === S.picks.p2[m.id]);
  const disagreed = bothPicked.length - agreed.length;

  const rowsByDate = {};
  sorted.forEach((m,i) => { const dk=m.date.split(',')[0]; if(!rowsByDate[dk])rowsByDate[dk]=[]; rowsByDate[dk].push(rows[i]); });
  const dateHtml = sortedDates.map(d => `<div class="group-title">${d}</div>${rowsByDate[d].join('')}`).join('');

  return `
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:18px;">
      <div style="background:var(--surface);border-radius:10px;padding:14px;text-align:center;border:1px solid var(--border);">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--text)">${bothPicked.length}</div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Both Picked</div>
      </div>
      <div style="background:var(--surface);border-radius:10px;padding:14px;text-align:center;border:2px solid var(--green);">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--green)">${agreed.length}</div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Agree ✓</div>
      </div>
      <div style="background:var(--surface);border-radius:10px;padding:14px;text-align:center;border:2px solid var(--red);">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--red)">${disagreed}</div>
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Disagree ✗</div>
      </div>
    </div>
    ${dateHtml}`;
}

window.render = function() {
  let body='';
  if(S.tab==='score') body=renderScore();
  else if(S.tab==='groups') body=renderGroups();
  else if(S.tab==='bydate') body=renderByDate();
  else if(S.tab==='versus') body=renderVersus();
  else body=renderKnockout();
  document.getElementById('app').innerHTML=`
    <div class="header" id="hdr"></div>
    <div class="nav">
      <button class="nav-btn ${S.tab==='score'?'active':''}" onclick="S.tab='score';render()">🏆 Scoreboard</button>
      <button class="nav-btn ${S.tab==='groups'?'active':''}" onclick="S.tab='groups';render()">⚽ By Group</button>
      <button class="nav-btn ${S.tab==='bydate'?'active':''}" onclick="S.tab='bydate';render()">📅 By Date</button>
      <button class="nav-btn ${S.tab==='ko'?'active':''}" onclick="S.tab='ko';render()">🗓 Knockout</button>
      <button class="nav-btn ${S.tab==='versus'?'active':''}" onclick="S.tab='versus';render()">⚔ Matchup</button>
      <button class="nav-btn ${S.tab==='setup'?'active':''}" onclick="S.tab='setup';render()">⚙ Setup</button>
    </div>
    <div class="content">
      <div class="admin-bar">
        <span>Admin (enter scores):</span>
        <button class="atoggle ${S.admin?'on':''}" onclick="S.admin=!S.admin;render()">${S.admin?'ON ✓':'OFF'}</button>
        <span style="margin-left:auto;font-size:12px">${Object.values(S.results).filter(r=>r?.winner).length} results entered</span>
      </div>
      ${S.tab==='setup' ? renderSetup() : body}
    </div>`;
  renderHeader();
};

window.S = S;
load();
render();
initFirebase();
</script>
</body>
</html>
